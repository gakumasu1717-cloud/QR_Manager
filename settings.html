<div id="qrm_settings" class="qrm-extension-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>QR Manager</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="flex-container flexFlowColumn" style="gap: 10px; padding: 5px 0;">

                <label class="checkbox_label" for="qrm_hide_bar">
                    <input id="qrm_hide_bar" type="checkbox">
                    <span>원본 QR 바 숨기기</span>
                </label>
                <small style="opacity: 0.7; margin-top: -6px;">기존 테마의 QR 스크롤 바를 숨기고 QR Manager 팝업만 사용합니다.</small>

                <label class="checkbox_label" for="qrm_close_on_run">
                    <input id="qrm_close_on_run" type="checkbox">
                    <span>QR 실행 시 팝업 자동 닫기</span>
                </label>
                <small style="opacity: 0.7; margin-top: -6px;">모바일 레이아웃에서는 항상 자동으로 닫힙니다.</small>

                <div class="flex-container alignItemsCenter" style="gap: 8px;">
                    <span>모바일 레이아웃</span>
                    <select id="qrm_mobile_mode" class="text_pole" style="width: auto;">
                        <option value="auto">자동 (화면 폭 기준)</option>
                        <option value="on">항상 켜기</option>
                        <option value="off">항상 끄기</option>
                    </select>
                </div>

                <div class="flex-container alignItemsCenter" style="gap: 8px;">
                    <span>테마 색상</span>
                    <input id="qrm_theme_color" type="color" style="width: 50px; height: 28px; padding: 0; border: none; background: none; cursor: pointer;">
                </div>

                <div class="flex-container" style="gap: 8px;">
                    <div id="qrm_reset_pos" class="menu_button">
                        <i class="fa-solid fa-crosshairs"></i>
                        <span>팝업 위치 초기화</span>
                    </div>
                    <div id="qrm_clear_favs" class="menu_button">
                        <i class="fa-solid fa-star-half-stroke"></i>
                        <span>즐겨찾기 비우기</span>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
